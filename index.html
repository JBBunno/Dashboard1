
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shutdown Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

/* ── TOKENS ── */
:root {
  --coal:   #0d1117;
  --slate:  #161b22;
  --panel:  #1c2330;
  --border: #2a3444;
  --muted:  #4d6080;
  --text:   #b8c9e0;
  --bright: #e2eaf5;
  --amber:  #f5a623;
  --green:  #2dcc8a;
  --red:    #e05555;
  --blue:   #4b8ef5;
  --planned:#e05555;
  --forecast:#4b8ef5;
  --font-d: 'DM Mono', 'Courier New', monospace;
  --font-u: 'Inter', system-ui, sans-serif;
  --r: 6px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--coal);color:var(--text);font-family:var(--font-u);font-size:14px;min-height:100vh}

/* ── CHROME ── */
header{
  background:var(--slate);border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:200;flex-wrap:wrap;
}
.logo{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);white-space:nowrap}
.hdr-name{font-size:15px;font-weight:500;color:var(--bright);flex:1;min-width:120px}
.hdr-upload{font-family:var(--font-d);font-size:11px;color:var(--muted)}
.hdr-ago{font-family:var(--font-d);font-size:12px;font-weight:500;color:var(--red)}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;
  font-family:var(--font-u);transition:border-color .15s,color .15s;white-space:nowrap}
.btn:hover{border-color:var(--amber);color:var(--amber)}

/* ── TABS ── */
nav{
  background:var(--slate);border-bottom:1px solid var(--border);
  display:flex;padding:0 24px;gap:2px;overflow-x:auto;
}
nav button{
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);cursor:pointer;font-family:var(--font-u);font-size:13px;
  padding:10px 16px;white-space:nowrap;transition:color .15s,border-color .15s;
}
nav button.active,nav button:hover{color:var(--bright)}
nav button.active{border-bottom-color:var(--amber)}

/* ── LAYOUT ── */
main{padding:20px 24px;max-width:1600px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.mb16{margin-bottom:16px}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── PANELS ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.panel-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}

/* ── EXEC HEADER BAND ── */
.exec-header{
  background:var(--slate);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 20px;margin-bottom:16px;
  display:grid;grid-template-columns:1fr auto auto;gap:24px;align-items:center;
}
.exec-name{font-size:16px;font-weight:600;color:var(--bright)}
.exec-kpi-group{display:flex;gap:32px}
.exec-kpi{text-align:right}
.exec-kpi-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.exec-kpi-value{font-family:var(--font-d);font-size:20px;font-weight:500;color:var(--bright)}
.exec-kpi-value.big{font-size:32px;color:var(--green)}
.exec-kpi-value.warn{color:var(--amber)}
.exec-kpi-value.over{color:var(--red)}

/* ── MAINT WINDOW BAND ── */
.maint-band{
  background:linear-gradient(135deg,#0e1a2e,#1a2840);
  border:1px solid #2a4060;border-radius:var(--r);
  padding:14px 20px;margin-bottom:16px;
  display:flex;flex-wrap:wrap;gap:24px;align-items:center;
}
.maint-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:2px}
.maint-value{font-family:var(--font-d);font-size:14px;color:var(--bright)}
.maint-divider{width:1px;background:var(--border);align-self:stretch}

/* ── KPI CARDS ── */
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.kpi-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-value{font-family:var(--font-d);font-size:26px;font-weight:500;color:var(--bright);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.green{color:var(--green)!important}.amber{color:var(--amber)!important}.red{color:var(--red)!important}.blue{color:var(--blue)!important}

/* ── AREA TABLE ── */
.area-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{
  padding:8px 10px;color:var(--muted);font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);
  text-align:right;white-space:nowrap;cursor:pointer;user-select:none;
}
th:first-child,th:nth-child(2){text-align:left}
th:hover{color:var(--text)}
td{padding:8px 10px;border-bottom:1px solid rgba(42,52,68,.5);text-align:right;white-space:nowrap}
td:first-child,td:nth-child(2){text-align:left;color:var(--bright)}
tr:hover td{background:rgba(75,142,245,.04)}
.tag{display:inline-block;background:rgba(75,142,245,.12);border-radius:3px;
  font-size:10px;padding:2px 6px;color:var(--blue);font-family:var(--font-d)}
.tag.done{color:var(--green);background:rgba(45,204,138,.12)}
.tag.warn{color:var(--amber);background:rgba(245,166,35,.12)}
.tag.over{color:var(--red);background:rgba(224,85,85,.12)}

/* ── PROGRESS BAR ── */
.pbar-bg{background:var(--border);border-radius:3px;height:6px;overflow:hidden;margin-top:8px}
.pbar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .5s}
.pbar-fill.amber{background:var(--amber)}.pbar-fill.red{background:var(--red)}

/* ── GANTT ── */
.gantt-wrap{display:flex;flex-direction:column;gap:6px}
.gantt-row{display:flex;align-items:center;gap:10px}
.gantt-label{width:160px;font-size:11px;color:var(--text);text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.gantt-track{flex:1;position:relative;height:18px;background:var(--border);border-radius:3px;overflow:hidden;display:flex}
.gantt-offset{height:100%;background:transparent;flex-shrink:0}
.gantt-done{height:100%;background:var(--green);flex-shrink:0}
.gantt-rem{height:100%;background:rgba(75,142,245,.4);flex-shrink:0}
.gantt-pct{font-family:var(--font-d);font-size:11px;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
.gantt-legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--muted)}
.gantt-legend span{display:flex;align-items:center;gap:5px}
.gantt-legend i{display:inline-block;width:12px;height:8px;border-radius:2px}

/* ── S-CURVE ── */
.scurve-controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.scurve-canvas-wrap{position:relative;width:100%}
canvas{width:100%!important}
.chart-legend{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap}
.chart-legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.chart-legend-dot{width:28px;height:3px;border-radius:2px;flex-shrink:0}
.chart-legend-dot.dashed{background:repeating-linear-gradient(90deg,currentColor 0,currentColor 4px,transparent 4px,transparent 8px)}

/* ── FIELD UPDATES ── */
.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input[type=text]{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:var(--font-u);font-size:13px;
  padding:7px 12px;outline:none;width:240px;transition:border-color .15s;
}
input[type=text]:focus{border-color:var(--amber)}
select{
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  border-radius:var(--r);padding:7px 10px;font-size:12px;
  font-family:var(--font-u);outline:none;cursor:pointer;
}
select:focus{border-color:var(--amber)}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-family:var(--font-d)}
.badge.done{color:var(--green);background:rgba(45,204,138,.12)}
.badge.pend{color:var(--amber);background:rgba(245,166,35,.12)}

/* ── LOADING / ERROR ── */
.overlay{
  position:fixed;inset:0;background:var(--coal);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;
}
.spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-text{font-size:13px;color:var(--muted)}
.err{background:rgba(224,85,85,.1);border:1px solid var(--red);border-radius:var(--r);
  color:var(--red);padding:10px 16px;margin-bottom:14px;font-size:13px;display:none}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="spin-text">Loading shutdown data…</div>
</div>

<header>
  <span class="logo">Palm Crest</span>
  <span class="hdr-name" id="hdrName">Shutdown Dashboard</span>
  <span class="hdr-upload" id="hdrUpload"></span>
  <span class="hdr-ago" id="hdrAgo"></span>
  <button class="btn" onclick="loadAll()">↻ Refresh</button>
</header>

<nav>
  <button class="active" onclick="switchTab('exec',this)">Executive Summary</button>
  <button onclick="switchTab('gantt',this)">Progress Gantt</button>
  <button onclick="switchTab('scurve',this)">S-Curve</button>
  <button onclick="switchTab('field',this)">Field Updates</button>
</nav>

<main>
  <div class="err" id="errBanner"></div>

  <!-- ══ EXEC SUMMARY ══ -->
  <div id="tab-exec" class="tab-panel active">
    <div id="execHeader" class="exec-header" style="display:none">
      <div class="exec-name" id="execName"></div>
      <div class="exec-kpi-group" id="execKpiGroup"></div>
    </div>
    <div id="maintBand" class="maint-band" style="display:none"></div>
    <div class="panel">
      <div class="panel-title">Shutdown Areas</div>
      <div class="area-table-wrap"><table id="areaTable"></table></div>
    </div>
  </div>

  <!-- ══ GANTT ══ -->
  <div id="tab-gantt" class="tab-panel">
    <div class="panel">
      <div class="panel-title">Shutdown Progress</div>
      <div class="gantt-legend">
        <span><i style="background:var(--muted)"></i> Start Offset</span>
        <span><i style="background:var(--green)"></i> Complete</span>
        <span><i style="background:rgba(75,142,245,.4)"></i> Remaining</span>
      </div>
      <div class="gantt-wrap" id="ganttChart"></div>
    </div>
  </div>

  <!-- ══ S-CURVE ══ -->
  <div id="tab-scurve" class="tab-panel">
    <div class="panel">
      <div class="scurve-controls">
        <span class="panel-title" style="margin:0">Area:</span>
        <select id="scurveArea" onchange="renderScurve()"></select>
      </div>
      <div class="chart-legend">
        <div class="chart-legend-item">
          <div class="chart-legend-dot" style="background:var(--planned)"></div>
          <span>Planned</span>
        </div>
        <div class="chart-legend-item">
          <div class="chart-legend-dot dashed" style="color:#333;background:var(--border)"></div>
          <span style="color:var(--bright)">Completed</span>
        </div>
        <div class="chart-legend-item">
          <div class="chart-legend-dot dashed" style="color:var(--forecast);background:var(--forecast)"></div>
          <span>Forecast</span>
        </div>
        <div class="chart-legend-item">
          <div class="chart-legend-dot" style="background:rgba(180,180,180,.4)"></div>
          <span>Spent (hrs)</span>
        </div>
      </div>
      <div class="scurve-canvas-wrap">
        <canvas id="scurveCanvas" height="380"></canvas>
      </div>
    </div>
  </div>

  <!-- ══ FIELD UPDATES ══ -->
  <div id="tab-field" class="tab-panel">
    <div class="filter-row">
      <input type="text" id="fieldSearch" placeholder="Search WO, team, notes…" oninput="renderField()">
      <select id="fieldTeam" onchange="renderField()"><option value="">All Teams</option></select>
      <select id="fieldStatus" onchange="renderField()">
        <option value="">All Status</option>
        <option value="Completed">Completed</option>
        <option value="Not Complete">Not Complete</option>
      </select>
    </div>
    <div class="panel">
      <div class="area-table-wrap"><table id="fieldTable"></table></div>
    </div>
  </div>
</main>

<!-- Chart.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — paste your deployed GAS Web App URL here 
// ══════════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwp4KdsvPWv2pON1iIOTjaJhYeLJpLZWBfShz2nBZRPCsCIeVH40o-GAURk9gPg7d-BZw/exec';

// ── STATE ─────────────────────────────────────────────────────
let _exec = null, _gantt = null, _scurve = null, _field = null;
let _scurveChart = null;

// ── TABS ──────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── FETCH ─────────────────────────────────────────────────────
async function gas(action, extra) {
  const url = GAS_URL + '?action=' + action + (extra || '') + '&t=' + Date.now();
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function showErr(msg) {
  const b = document.getElementById('errBanner');
  b.textContent = msg; b.style.display = 'block';
}

async function loadAll() {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('errBanner').style.display = 'none';
  try {
    const [meta, exec, gantt, scurve, field] = await Promise.all([
      gas('meta'), gas('exec'), gas('gantt'), gas('scurve'), gas('fieldupdates')
    ]);
    _exec = exec; _gantt = gantt; _scurve = scurve; _field = field;

    applyMeta(meta);
    renderExec();
    renderGantt();
    initScurve();
    initField();
  } catch(e) {
    showErr('Error loading data: ' + e.message + '. Check your GAS_URL is set and the script is deployed correctly.');
  } finally {
    document.getElementById('overlay').style.display = 'none';
  }
}

// ── META ──────────────────────────────────────────────────────
function applyMeta(m) {
  if (m.shutdownName) {
    document.getElementById('hdrName').textContent = m.shutdownName;
    document.title = m.shutdownName + ' — Dashboard';
  }
  if (m.lastUpload) {
    document.getElementById('hdrUpload').textContent = 'Last upload: ' + m.lastUpload;
  }
  if (m.hoursAgo !== null && m.hoursAgo !== undefined) {
    const el = document.getElementById('hdrAgo');
    el.textContent = m.hoursAgo + ' Hrs Ago';
    el.style.color = m.hoursAgo > 48 ? 'var(--red)' : 'var(--amber)';
  }
}

// ── EXEC SUMMARY ─────────────────────────────────────────────
function pctColor(p) { return p >= 90 ? 'green' : p >= 50 ? 'amber' : 'red'; }
function fmtNum(n, dp=1) { return (Math.round(n * Math.pow(10,dp)) / Math.pow(10,dp)).toFixed(dp); }

function renderExec() {
  const d = _exec;
  if (!d || !d.kpis) return;
  const { kpis, areas } = d;

  // Header band
  const hdr = document.getElementById('execHeader');
  hdr.style.display = 'grid';
  document.getElementById('execName').textContent =
    document.getElementById('hdrName').textContent;

  const pc = kpis.pctComplete || 0;
  document.getElementById('execKpiGroup').innerHTML = `
    <div class="exec-kpi">
      <div class="exec-kpi-label">Percent Complete</div>
      <div class="exec-kpi-value big ${pctColor(pc)}">${pc}%</div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-label">Forecast Finish</div>
      <div class="exec-kpi-value">${kpis.forecastFinish || '—'}</div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-label">Forecast Overrun</div>
      <div class="exec-kpi-value ${(kpis.forecastOverrun||0) > 0 ? 'warn' : 'green'}">
        ${(kpis.forecastOverrun||0) > 0 ? '+' : ''}${fmtNum(kpis.forecastOverrun||0,0)} Hrs
      </div>
    </div>
    <div class="exec-kpi">
      <div class="exec-kpi-label">Remaining Hours</div>
      <div class="exec-kpi-value ${(kpis.remainingHours||0) <= 0 ? 'green' : 'warn'}">
        ${fmtNum(kpis.remainingHours||0,0)} Hrs
      </div>
    </div>`;

  // Maintenance Window band
  const mw = kpis.maintWindow || {};
  const mBand = document.getElementById('maintBand');
  mBand.style.display = 'flex';
  mBand.innerHTML = `
    <div>
      <div class="maint-label">Maintenance Window</div>
    </div>
    <div class="maint-divider"></div>
    <div><div class="maint-label">Start</div><div class="maint-value">${mw.start||'—'}</div></div>
    <div><div class="maint-label">Finish</div><div class="maint-value">${mw.finish||'—'}</div></div>
    <div class="maint-divider"></div>
    <div><div class="maint-label">Work Hours</div><div class="maint-value">${fmtNum(mw.workHours||0,0)} Hrs</div></div>
    <div><div class="maint-label">Completed</div><div class="maint-value">${fmtNum(mw.completed||0,0)} Hrs</div></div>
    <div class="maint-divider"></div>
    <div><div class="maint-label">Overrun</div>
      <div class="maint-value ${(mw.overrun||0)>0?'amber':''}">${fmtNum(mw.overrun||0,0)} Hrs</div></div>
    <div><div class="maint-label">% Complete</div>
      <div class="maint-value ${pctColor(mw.pctComplete||0)}">${mw.pctComplete||0}%</div></div>`;

  // Area breakdown table
  const cols = ['Area','% Comp','Duration','Completed Work','Total Work','Remaining Work','Start','Forecast Finish','Hrs to Critical','Finish Var'];
  const tbody = (areas||[]).map(a => {
    const fv = a.finishVariance || 0;
    const fvCls = fv > 0 ? 'over' : fv < 0 ? 'done' : '';
    const htc = a.hoursToCritical || 0;
    return `<tr>
      <td>${a.name}</td>
      <td><span class="tag ${pctColor(a.pctComplete)}">${a.pctComplete}%</span></td>
      <td>${fmtNum(a.duration,1)}</td>
      <td>${fmtNum(a.completedWork,2)}</td>
      <td>${fmtNum(a.totalWork,2)}</td>
      <td>${fmtNum(a.remainingWork,2)}</td>
      <td>${a.start}</td>
      <td>${a.forecastFinish}</td>
      <td><span class="${htc===0?'':'amber'}">${fmtNum(htc,0)}</span></td>
      <td><span class="${fvCls}">${fv>0?'+':''}${fmtNum(fv,1)}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('areaTable').innerHTML =
    `<thead><tr>${cols.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${tbody||'<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:20px">No data</td></tr>'}</tbody>`;
}

// ── GANTT ─────────────────────────────────────────────────────
function renderGantt() {
  const d = _gantt;
  if (!d || !d.areas) return;
  const areas = d.areas;

  // Total width = max of (startOffset + completed + remaining) across all areas
  const maxHrs = areas.reduce((m, a) => Math.max(m, a.startOffset + a.completed + a.remaining), 1);

  const wrap = document.getElementById('ganttChart');
  wrap.innerHTML = areas.map(a => {
    const offPct  = (a.startOffset / maxHrs * 100).toFixed(2);
    const donePct = (a.completed   / maxHrs * 100).toFixed(2);
    const remPct  = (a.remaining   / maxHrs * 100).toFixed(2);
    return `<div class="gantt-row">
      <div class="gantt-label" title="${a.name}">${a.name}</div>
      <div class="gantt-track">
        <div class="gantt-offset" style="flex:${offPct}"></div>
        <div class="gantt-done"   style="flex:${donePct}"></div>
        <div class="gantt-rem"    style="flex:${remPct}"></div>
        <div style="flex:${Math.max(0,100-parseFloat(offPct)-parseFloat(donePct)-parseFloat(remPct))}"></div>
      </div>
      <div class="gantt-pct">${a.pctComplete}%</div>
    </div>`;
  }).join('');
}

// ── S-CURVE ───────────────────────────────────────────────────
function initScurve() {
  const d = _scurve;
  if (!d || !d.areas) return;

  const sel = document.getElementById('scurveArea');
  sel.innerHTML = d.areas.map(a => `<option value="${a}">${a}</option>`).join('');
  renderScurve();
}

function renderScurve() {
  const d = _scurve;
  if (!d || !d.series) return;

  const area = document.getElementById('scurveArea').value;
  const s = d.series[area];
  if (!s) return;

  const labels   = s.labels;
  const work     = s.work;      // cumulative planned
  const actual   = s.actual;    // cumulative actual
  const baseline = s.baseline;  // cumulative baseline (used as forecast extension)

  // Find index where actual stops (last non-zero)
  let cutoff = actual.length - 1;
  while (cutoff > 0 && actual[cutoff] === 0) cutoff--;

  // Forecast = actual up to cutoff, then baseline trend extended
  const forecast = actual.map((v, i) => i <= cutoff ? v : null);
  if (cutoff < labels.length - 1) {
    const rate = actual[cutoff] > 0
      ? baseline[baseline.length - 1] / cutoff
      : 0;
    for (let i = cutoff; i < labels.length; i++) {
      forecast[i] = Math.min(baseline[baseline.length - 1], actual[cutoff] + rate * (i - cutoff));
    }
  }

  // Spent (per-period, not cumulative) — derive from actual
  const spent = [actual[0]];
  for (let i = 1; i < actual.length; i++) {
    spent.push(Math.max(0, actual[i] - actual[i - 1]));
  }

  const ctx = document.getElementById('scurveCanvas').getContext('2d');
  if (_scurveChart) _scurveChart.destroy();

  // Thin label array for readability
  const maxLabels = 20;
  const step = Math.ceil(labels.length / maxLabels);
  const sparseLabels = labels.map((l, i) => i % step === 0 ? l : '');

  _scurveChart = new Chart(ctx, {
    data: {
      labels: sparseLabels,
      datasets: [
        {
          type: 'bar',
          label: 'Spent (hrs)',
          data: spent,
          backgroundColor: 'rgba(180,180,180,.25)',
          borderColor: 'transparent',
          yAxisID: 'yHrs',
          order: 4,
        },
        {
          type: 'line',
          label: 'Planned',
          data: work,
          borderColor: 'var(--planned)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.4,
          yAxisID: 'yPct',
          order: 1,
        },
        {
          type: 'line',
          label: 'Completed',
          data: actual,
          borderColor: '#ccc',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [6, 3],
          pointRadius: 0,
          tension: 0.3,
          yAxisID: 'yPct',
          order: 2,
        },
        {
          type: 'line',
          label: 'Forecast',
          data: forecast,
          borderColor: 'var(--forecast)',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0.3,
          yAxisID: 'yPct',
          order: 3,
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2330',
          borderColor: '#2a3444',
          borderWidth: 1,
          titleColor: '#b8c9e0',
          bodyColor: '#b8c9e0',
        },
      },
      scales: {
        x: {
          ticks: { color: '#4d6080', font: { size: 10 }, maxRotation: 45 },
          grid:  { color: 'rgba(42,52,68,.5)' },
        },
        yPct: {
          type: 'linear',
          position: 'left',
          min: 0,
          ticks: {
            color: '#4d6080', font: { size: 11 },
            callback: v => {
              const max = Math.max(...work);
              return max > 0 ? Math.round(v / max * 100) + '%' : v;
            },
          },
          grid: { color: 'rgba(42,52,68,.5)' },
        },
        yHrs: {
          type: 'linear',
          position: 'right',
          min: 0,
          ticks: { color: '#4d6080', font: { size: 11 }, callback: v => v + ' Hrs' },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

// ── FIELD UPDATES ─────────────────────────────────────────────
function initField() {
  const d = _field;
  if (!d || !d.rows) return;

  // Populate team filter — try to find "Team" column
  const teamIdx = (d.headers || []).findIndex(h => /team/i.test(h));
  const teams = teamIdx >= 0
    ? [...new Set(d.rows.map(r => r[teamIdx]).filter(Boolean))].sort()
    : [];
  const sel = document.getElementById('fieldTeam');
  sel.innerHTML = '<option value="">All Teams</option>' +
    teams.map(t => `<option value="${t}">${t}</option>`).join('');

  renderField();
}

function renderField() {
  const d = _field;
  if (!d || !d.rows) return;

  const search = (document.getElementById('fieldSearch').value || '').toLowerCase();
  const team   = document.getElementById('fieldTeam').value;
  const status = document.getElementById('fieldStatus').value;

  const headers = d.headers || [];
  const teamIdx   = headers.findIndex(h => /team/i.test(h));
  const statusIdx = headers.findIndex(h => /upload.?status|wo.?status/i.test(h));
  const notesIdx  = headers.findIndex(h => /notes|field.?note/i.test(h));

  let rows = d.rows.filter(r => {
    if (team && teamIdx >= 0 && r[teamIdx] !== team) return false;
    if (status && statusIdx >= 0 && r[statusIdx] !== status) return false;
    if (search) {
      const hay = r.join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Show key columns only — adapt based on actual headers
  const showCols = ['Team','Work Order Header','WO Operation','Work (hrs)','Task (%)','Project (%)','App (%)','Field notes','Upload Status'];
  const idxMap = showCols.map(h => headers.findIndex(c => c === h));

  // Fallback: show all if column map fails
  const useIdxMap = idxMap.some(i => i >= 0);
  const displayHeaders = useIdxMap ? showCols.filter((_,i) => idxMap[i] >= 0) : headers;
  const activeIdx = useIdxMap ? idxMap.filter(i => i >= 0) : headers.map((_,i) => i);

  const tHead = displayHeaders.map(h => `<th>${h}</th>`).join('');
  const tBody = rows.slice(0, 500).map(r => {
    return '<tr>' + activeIdx.map((ci, di) => {
      const val = r[ci] || '';
      const isStatus = displayHeaders[di] === 'Upload Status';
      const hasNotes = displayHeaders[di] === 'Field notes' && val;
      if (isStatus) {
        const cls = val === 'Completed' ? 'done' : 'pend';
        return `<td><span class="badge ${cls}">${val||'—'}</span></td>`;
      }
      if (hasNotes) return `<td style="max-width:280px;white-space:normal;color:var(--bright)">${val}</td>`;
      return `<td>${val||'—'}</td>`;
    }).join('') + '</tr>';
  }).join('');

  document.getElementById('fieldTable').innerHTML =
    `<thead><tr>${tHead}</tr></thead>` +
    `<tbody>${tBody || '<tr><td colspan="' + displayHeaders.length + '" style="text-align:center;color:var(--muted);padding:20px">No results</td></tr>'}</tbody>`;
}

// ── BOOT ──────────────────────────────────────────────────────
loadAll();
</script>
